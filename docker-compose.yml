# docker-compose.yml
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: knu-uic-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-knu-uic}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-knu-uic}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-knu-uic} -d ${DB_NAME:-knu-uic}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bot_network

  app:
    build: .
    container_name: knu-uic-app
    restart: always
    ports:
      - "8501:8501"
    environment:
      # LLM / 임베딩
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}        # attachments.py가 둘 중 잡히는 키 사용
      # DB: db.py가 DB_PASSWORD를 직접 읽어 DB_URL을 조립한다
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER:-knu-uic}
      - DB_NAME=${DB_NAME:-knu-uic}
      - DB_HOST=db
      - DB_PORT=5432
      - DATABASE_URL=postgresql://${DB_USER:-knu-uic}:${DB_PASSWORD}@db:5432/${DB_NAME:-knu-uic}
      # LM Studio를 호스트 머신에서 실행할 때 Docker 컨테이너가 접근하는 주소
      - VLM_PROVIDER=${VLM_PROVIDER:-lmstudio}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-lmstudio}
      - LLM_MODEL=${LLM_MODEL:-gemma-4-e4b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      # LangSmith 트레이싱 (LANGSMITH_TRACING이 비어있거나 false면 비활성화)
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-knu-ai-assistant}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
    volumes:
      - .:/app
      # 크롤링 결과(이미지 자산 등)는 호스트의 프로젝트 디렉터리에 그대로 남음 (위 bind mount로 커버)
    depends_on:
      db:
        condition: service_healthy   # pg_isready 통과 후에만 app 기동
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bot_network

volumes:
  pgdata:

networks:
  bot_network:
    driver: bridge
